<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishna Verma - Web Development & Tech Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f9f7f2;
            --surface: #ffffff;
            --border: #e0dcd3;
            --text: #2a2520;
            --muted: #6b6560;
            --accent: #d4a574;
            --accent-hover: #c39562;
            --success: #4a8c5a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            line-height: 1.3;
            font-weight: 700;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .section-reveal > * {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .section-reveal.active > *:nth-child(1) { transition-delay: 0.1s; }
        .section-reveal.active > *:nth-child(2) { transition-delay: 0.2s; }
        .section-reveal.active > *:nth-child(3) { transition-delay: 0.3s; }
        .section-reveal.active > *:nth-child(4) { transition-delay: 0.4s; }
        .section-reveal.active > *:nth-child(5) { transition-delay: 0.5s; }

        .section-reveal.active > * {
            opacity: 1;
            transform: translateY(0);
        }

        .btn {
            display: inline-block;
            padding: 16px 36px;
            background-color: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            border: 2px solid var(--accent);
            cursor: pointer;
            font-size: 1rem;
            text-align: center;
            min-width: 160px;
        }

        .btn:hover {
            background-color: var(--accent-hover);
            border-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(212, 165, 116, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
            background-color: rgba(212, 165, 116, 0.05);
            box-shadow: none;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            height: 100%;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border-color: var(--accent);
        }

        .nav-link {
            position: relative;
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            padding: 8px 0;
            display: inline-block;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: var(--accent);
        }

        .nav-link.active {
            color: var(--accent);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: var(--accent);
            transform: scaleX(0);
            transform-origin: center;
            transition: transform 0.3s ease;
        }

        .nav-link:hover::after {
            transform: scaleX(1);
        }

        .hero-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.9;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(249,247,242,0.95) 0%, rgba(249,247,242,0.85) 100%);
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 900px;
            text-align: center;
            padding: 0 20px;
        }

        .navbar {
            position: sticky;
            top: 0;
            background: rgba(249, 247, 242, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 18px 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.03);
        }

        .navbar-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo svg {
            height: 32px;
            width: auto;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .navbar-menu {
            display: flex;
            list-style: none;
            gap: 30px;
            align-items: center;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--text);
            padding: 5px;
        }

        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 140px 0 100px;
        }

        .hero h1 {
            font-size: clamp(2.8rem, 6vw, 4.5rem);
            margin-bottom: 24px;
            color: var(--text);
            line-height: 1.2;
        }

        .hero .subtitle {
            font-size: clamp(1.2rem, 2.2vw, 1.6rem);
            color: var(--muted);
            margin-bottom: 48px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-cta {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .trust-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.8);
            border-radius: 30px;
            font-size: 0.9rem;
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .portfolio {
            padding: 120px 0;
        }

        .section-title {
            text-align: center;
            font-size: clamp(2.2rem, 4vw, 3rem);
            margin-bottom: 70px;
            color: var(--text);
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: var(--accent);
        }

        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 11px 26px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(212, 165, 116, 0.05);
        }

        .filter-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(212, 165, 116, 0.2);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 35px;
        }

        .project-card-img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .project-card-img {
            transform: scale(1.05);
        }

        .project-card-content {
            padding: 28px;
        }

        .project-card-title {
            font-size: 1.5rem;
            margin-bottom: 14px;
            color: var(--text);
        }

        .project-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
        }

        .tech-tag {
            background: var(--bg);
            color: var(--muted);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .project-description {
            color: var(--muted);
            line-height: 1.7;
            font-size: 1rem;
        }

        .about {
            padding: 120px 0;
            background: linear-gradient(180deg, var(--bg) 0%, var(--surface) 100%);
        }

        .about-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .about p {
            margin-bottom: 28px;
            font-size: 1.1rem;
            color: var(--text);
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 22px;
            margin-top: 50px;
        }

        .skill-item {
            background: var(--surface);
            padding: 22px;
            border-radius: 10px;
            border: 1px solid var(--border);
            text-align: center;
            transition: all 0.3s ease;
        }

        .skill-item:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.05);
        }

        .skill-name {
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text);
            font-size: 1.05rem;
        }

        .skill-level {
            height: 8px;
            background: var(--bg);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .skill-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-hover));
            border-radius: 4px;
            transition: width 1s ease;
        }

        .testimonials {
            padding: 120px 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 60px;
        }

        .testimonial-card {
            background: var(--bg);
            border-radius: 12px;
            padding: 32px;
            border: 1px solid var(--border);
            position: relative;
        }

        .testimonial-card::before {
            content: '"';
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 4rem;
            color: var(--accent);
            opacity: 0.1;
            font-family: 'Playfair Display', serif;
            line-height: 1;
        }

        .testimonial-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin-bottom: 20px;
            object-fit: cover;
            border: 3px solid var(--accent);
        }

        .testimonial-text {
            font-style: italic;
            margin-bottom: 24px;
            color: var(--text);
            font-size: 1.05rem;
            line-height: 1.7;
        }

        .testimonial-author {
            display: flex;
            flex-direction: column;
        }

        .testimonial-author strong {
            color: var(--text);
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .testimonial-author span {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .contact {
            padding: 120px 0;
        }

        .contact-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .contact-form {
            background: var(--surface);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text);
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: var(--bg);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: white;
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.1);
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .contact-item {
            display: flex;
            align-items: flex-start;
            gap: 18px;
        }

        .contact-icon {
            width: 52px;
            height: 52px;
            background: var(--bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 1.3rem;
            flex-shrink: 0;
            border: 1px solid var(--border);
        }

        .contact-text {
            flex: 1;
        }

        .contact-text h4 {
            margin-bottom: 6px;
            font-size: 1.1rem;
        }

        .contact-text a {
            color: var(--muted);
            text-decoration: none;
            transition: color 0.3s ease;
            word-break: break-word;
        }

        .contact-text a:hover {
            color: var(--accent);
        }

        .guarantee {
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.08) 0%, rgba(212, 165, 116, 0.15) 100%);
            border-radius: 10px;
            border: 1px solid rgba(212, 165, 116, 0.2);
        }

        .guarantee h4 {
            color: var(--accent);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .guarantee p {
            margin: 0;
            color: var(--text);
            font-size: 0.95rem;
        }

        .social-links {
            display: flex;
            gap: 16px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .social-links .nav-link {
            padding: 6px 12px;
            background: var(--bg);
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .footer {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 80px 0 40px;
            margin-top: 60px;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 40px;
            margin-bottom: 50px;
        }

        .footer-brand {
            max-width: 300px;
        }

        .footer-brand .logo {
            margin-bottom: 12px;
        }

        .footer-brand p {
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .footer-links {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .footer-link {
            color: var(--muted);
            text-decoration: none;
            transition: color 0.3s ease;
            font-weight: 500;
        }

        .footer-link:hover {
            color: var(--accent);
        }

        .copyright {
            text-align: center;
            color: var(--muted);
            padding-top: 30px;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
        }

        @media (max-width: 968px) {
            .contact-container {
                gap: 50px;
            }
        }

        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }

            .navbar-menu {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                flex-direction: column;
                padding: 25px;
                gap: 20px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.05);
                align-items: stretch;
            }

            .navbar-menu.active {
                display: flex;
            }

            .navbar-menu li {
                width: 100%;
            }

            .navbar-menu .btn {
                width: 100%;
            }

            .contact-container {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .hero {
                padding: 120px 0 80px;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .filter-bar {
                gap: 8px;
            }

            .filter-btn {
                padding: 8px 16px;
                font-size: 0.9rem;
            }

            .footer-content {
                flex-direction: column;
                text-align: center;
            }

            .hero-cta {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CTAButton = ({ children, href, onClick, variant = 'primary', className = '', ...props }) => (
            <a 
                href={href} 
                className={`btn ${variant === 'secondary' ? 'btn-secondary' : ''} ${className}`}
                onClick={onClick}
                {...props}
            >
                {children}
            </a>
        );

        const Logo = () => (
            <svg width="200" height="40" viewBox="0 0 200 40" xmlns="http://www.w3.org/2000/svg">
                <text x="0" y="30" fontFamily="'Playfair Display', serif" fontSize="24" fill="var(--text)" fontWeight="700">
                    Krishna Verma
                </text>
            </svg>
        );

        const Navbar = () => {
            const [isOpen, setIsOpen] = useState(false);

            const scrollToSection = (sectionId) => {
                const element = document.getElementById(sectionId);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                    setIsOpen(false);
                }
            };

            return (
                <nav className="navbar">
                    <div className="container navbar-container">
                        <a href="#home" className="logo" onClick={(e) => { e.preventDefault(); scrollToSection('home'); }}>
                            <Logo />
                        </a>
                        <div className="navbar-right">
                            <ul className={`navbar-menu ${isOpen ? 'active' : ''}`}>
                                <li>
                                    <button className="nav-link" onClick={() => scrollToSection('home')}>Home</button>
                                </li>
                                <li>
                                    <button className="nav-link" onClick={() => scrollToSection('portfolio')}>Portfolio</button>
                                </li>
                                <li>
                                    <button className="nav-link" onClick={() => scrollToSection('about')}>About</button>
                                </li>
                                <li>
                                    <button className="nav-link" onClick={() => scrollToSection('testimonials')}>Testimonials</button>
                                </li>
                                <li>
                                    <CTAButton href="#contact" className="navbar-cta">Hire Me</CTAButton>
                                </li>
                            </ul>
                            <button 
                                className="mobile-menu-btn" 
                                onClick={() => setIsOpen(!isOpen)}
                                aria-label="Toggle menu"
                            >
                                {isOpen ? '✕' : '☰'}
                            </button>
                        </div>
                    </div>
                </nav>
            );
        };

        const Hero = () => {
            const canvasRef = useRef(null);

            useEffect(() => {
                if (!canvasRef.current) return;

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ 
                    alpha: true, 
                    antialias: true 
                });
                
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                canvasRef.current.appendChild(renderer.domElement);

                const geometry = new THREE.IcosahedronGeometry(8, 1);
                const material = new THREE.MeshStandardMaterial({ 
                    color: 0xd1cdc7,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.6
                });
                const mesh = new THREE.Mesh(geometry, material);
                scene.add(mesh);

                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);

                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(10, 10, 5);
                scene.add(directionalLight);

                camera.position.z = 25;

                let mouseX = 0;
                let mouseY = 0;
                let targetX = 0;
                let targetY = 0;

                const handleMouseMove = (event) => {
                    mouseX = (event.clientX / window.innerWidth) * 2 - 1;
                    mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
                };

                window.addEventListener('mousemove', handleMouseMove);

                const animate = () => {
                    requestAnimationFrame(animate);

                    mesh.rotation.x += 0.001;
                    mesh.rotation.y += 0.002;

                    targetX = mouseX * 2;
                    targetY = mouseY * 2;

                    mesh.rotation.y += 0.05 * (targetX - mesh.rotation.y);
                    mesh.rotation.x += 0.05 * (targetY - mesh.rotation.x);

                    renderer.render(scene, camera);
                };
                animate();

                const handleResize = () => {
                    if (!canvasRef.current) return;
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('resize', handleResize);
                    if (canvasRef.current && renderer.domElement) {

                    geometry.dispose();
                    material.dispose();
                    renderer.dispose();
                };
            }, []);

                email: '',

            const [submitStatus, setSubmitStatus] = useState(null);

                        headers: {

                        body: JSON.stringify(formData)
                    });

                        setSubmitStatus('success');
                        setFormData({ name: '', email: '', message: '' });
                    } else {
                        setSubmitStatus('error');

                    setSubmitStatus('error');

                    setIsSubmitting(false);

                                        </div>
                                        <div className="form-group">
                                            <label htmlFor="email">Email Address</label>
                                            <input

                                                required

                                            className="btn"

                                            style={{ width: '100%' }}
                                        >
                                            {isSubmitting ? 'Sending...' : 'Send Message'}

                                    </form>
